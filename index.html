<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch Vạn Niên</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0ece4;min-height:100vh;padding:16px;}
.container{max-width:580px;margin:0 auto;}
h2{font-size:1.4rem;color:#5a3e28;margin-bottom:12px;}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.tabs button{padding:7px 14px;font-size:13px;border:none;border-radius:8px;cursor:pointer;font-weight:600;color:#fff;}
.picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
select{padding:6px 8px;font-size:14px;border:1.5px solid #c8b89a;border-radius:8px;background:#fff;color:#3a2a1a;}
.btn{padding:7px 16px;font-size:14px;border:none;border-radius:8px;cursor:pointer;font-weight:600;color:#fff;background:#8b5e3c;}
.btn:hover{filter:brightness(0.88);}
.btn-today{background:#5a8a5a;}
.btn-copy{background:#5a6a8a;}
.card{background:#fff;border-radius:12px;padding:14px;border:1px solid #ddd2c0;margin-bottom:10px;}
.card-title{font-weight:700;color:#8b5e3c;font-size:13px;margin-bottom:8px;border-bottom:1px dashed #e8d8c0;padding-bottom:5px;}
.row{display:flex;justify-content:space-between;font-size:13px;padding:2px 0;gap:8px;}
.lbl{color:#888;min-width:130px;flex-shrink:0;}
.val{font-weight:600;color:#2a1a0a;text-align:right;}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;}
.good{background:#d4edda;color:#155724;}
.bad{background:#f8d7da;color:#721c24;}
.neutral{background:#fff3cd;color:#856404;}
.gio-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;margin-top:4px;}
.gio-item{font-size:11.5px;padding:4px 7px;border-radius:6px;display:flex;justify-content:space-between;}
.gio-hd{background:#d4edda;color:#155724;}
.gio-ac{background:#f8d7da;color:#721c24;}
.huong-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:6px;}
.huong-item{border-radius:8px;padding:6px 8px;font-size:12px;}
.huong-hy{background:#d4edda;color:#155724;}
.huong-tai{background:#cce5ff;color:#004085;}
.huong-hac{background:#f8d7da;color:#721c24;}
.huong-none{background:#f4f4f4;color:#888;}
.dg-box{border-radius:8px;padding:8px 10px;font-size:13px;margin-top:6px;line-height:1.6;}
.dg-good{background:#d4edda;color:#155724;border-left:3px solid #28a745;}
.dg-bad{background:#f8d7da;color:#721c24;border-left:3px solid #dc3545;}
.dg-neutral{background:#fff3cd;color:#856404;border-left:3px solid #ffc107;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:6px;}
.cal-head{text-align:center;font-size:11px;font-weight:700;color:#8b5e3c;padding:3px 0;}
.cal-day{text-align:center;font-size:12px;padding:4px 2px;border-radius:6px;cursor:pointer;border:1px solid transparent;}
.cal-day:hover{background:#f0e0d0;}
.cal-day.today{background:#8b5e3c;color:#fff!important;}
.cal-day.today .am,.cal-day.today .tr-good,.cal-day.today .tr-bad,.cal-day.today .tr-mid{color:#fff!important;}
.cal-day .sl{font-weight:600;font-size:13px;}
.cal-day .am{font-size:10px;color:#888;}
.cal-day .tr-good{color:#155724;font-size:10px;font-weight:600;}
.cal-day .tr-bad{color:#dc3545;font-size:10px;font-weight:600;}
.cal-day .tr-mid{color:#856404;font-size:10px;}
.cal-day.other-month{opacity:0.3;}
label{font-size:13px;display:flex;align-items:center;gap:5px;color:#3a2a1a;}
</style>
</head>
<body>
<div class="container">
  <h2>🗓 Lịch Vạn Niên</h2>
  <div class="tabs">
    <button id="tabDL" class="btn" onclick="switchTab('dl')">Dương → Âm</button>
    <button id="tabAL" class="btn" onclick="switchTab('al')" style="background:#bba080">Âm → Dương</button>
    <button id="tabCAL" class="btn" onclick="switchTab('cal')" style="background:#7a8a6a">Xem Tháng</button>
  </div>

  <div id="panelDL">
    <div class="picker">
      <select id="selDay"></select><select id="selMonth"></select><select id="selYear"></select>
      <button class="btn btn-today" onclick="chonHomNay()">Hôm nay</button>
      <button class="btn" onclick="xemLich()">Xem</button>
    </div>
    <div id="result"></div>
    <div style="margin-top:6px;"><button class="btn btn-copy" onclick="copyKQ('result')" style="font-size:12px;padding:5px 12px;">📋 Sao chép</button></div>
  </div>

  <div id="panelAL" style="display:none">
    <div class="picker">
      <select id="amDay"></select><select id="amMonth"></select><select id="amYear"></select>
      <label><input type="checkbox" id="amLeap"> Nhuận</label>
      <button class="btn" onclick="xemLichAm()">Xem</button>
    </div>
    <div id="resultAm"></div>
    <div style="margin-top:6px;"><button class="btn btn-copy" onclick="copyKQ('resultAm')" style="font-size:12px;padding:5px 12px;">📋 Sao chép</button></div>
  </div>

  <div id="panelCAL" style="display:none">
    <div class="picker">
      <select id="calMonth"></select><select id="calYear"></select>
      <button class="btn" onclick="xemThang()">Xem</button>
    </div>
    <div style="font-size:11px;color:#666;margin-bottom:6px;">
      <span class="badge good">Tốt</span> Kiến/Trừ/Mãn/Bình/Định/Thành/Khai &nbsp;
      <span class="badge bad">Xấu</span> Phá/Nguy/Thâu/Bế/Chấp &nbsp;
      <span class="badge neutral">TB</span> Mãn/Chấp
    </div>
    <div id="calResult"></div>
  </div>
</div>

<script>
// ── DROPDOWNS ──────────────────────────────────────────────────────
const today=new Date();
function fillSel(id,min,max,isMonth,def){
  const el=document.getElementById(id);
  for(let v=min;v<=max;v++){const o=document.createElement('option');o.value=v;o.text=isMonth?'Tháng '+v:v;if(v===def)o.selected=true;el.appendChild(o);}
}
fillSel('selDay',1,31,false,today.getDate());
fillSel('selMonth',1,12,true,today.getMonth()+1);
fillSel('selYear',1900,2100,false,today.getFullYear());
fillSel('amDay',1,30,false,1);fillSel('amMonth',1,12,true,1);fillSel('amYear',1900,2100,false,today.getFullYear());
fillSel('calMonth',1,12,true,today.getMonth()+1);fillSel('calYear',1900,2100,false,today.getFullYear());

function switchTab(t){
  ['dl','al','cal'].forEach(x=>{
    document.getElementById('panel'+x.toUpperCase()).style.display=t===x?'':'none';
  });
  document.getElementById('tabDL').style.background=t==='dl'?'#8b5e3c':'#bba080';
  document.getElementById('tabAL').style.background=t==='al'?'#8b5e3c':'#bba080';
  document.getElementById('tabCAL').style.background=t==='cal'?'#5a6a4a':'#7a8a6a';
}
function chonHomNay(){const n=new Date();document.getElementById('selDay').value=n.getDate();document.getElementById('selMonth').value=n.getMonth()+1;document.getElementById('selYear').value=n.getFullYear();xemLich();}
function copyKQ(id){const t=document.getElementById(id).innerText;navigator.clipboard?navigator.clipboard.writeText(t).then(()=>alert('Đã sao chép!')):((ta=>{document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('Đã sao chép!');})(Object.assign(document.createElement('textarea'),{value:t})));}

function INT(d){return d>=0?Math.floor(d):Math.ceil(d);}
function sumS(s,t){let r=0;for(const[A,B,C]of s)r+=A*Math.cos(B+C*t);return r;}
function sunLon(jdn){

}
function jdFD(dd,mm,yy){dd=+dd;mm=+mm;yy=+yy;const a=INT((14-mm)/12),y=yy+4800-a,m=mm+12*a-3;let jd=dd+INT((153*m+2)/5)+365*y+INT(y/4)-INT(y/100)+INT(y/400)-32045;if(jd<2299161)jd=dd+INT((153*m+2)/5)+365*y+INT(y/4)-32083;return jd;}
function jdTD(jd){let a,b,c;if(jd>2299160){a=jd+32044;b=INT((4*a+3)/146097);c=a-INT(b*146097/4);}else{b=0;c=jd+32082;}const d=INT((4*c+3)/1461),e=c-INT(1461*d/4),m=INT((5*e+2)/153);return[e-INT((153*m+2)/5)+1,m+3-12*INT(m/10),b*100+d-4800+INT(m/10)];}
function newMoon(k){const T=k/1236.85,T2=T*T,T3=T2*T;let J=2415020.75933+29.53058868*k+0.0001178*T2-0.000000155*T3;J+=0.00033*Math.sin((166.56+132.87*T-0.009173*T2)*dr);const Ma=359.2242+29.10535608*k-0.0000333*T2-0.000000347*T3,Mp=306.0253+385.81691806*k+0.0107306*T2+0.00001236*T3,F=21.2964+390.67050646*k-0.0016528*T2-0.00000239*T3;const C1=(0.1734-0.000393*T)*Math.sin(Ma*dr)+0.0021*Math.sin(2*dr*Ma)-0.4068*Math.sin(Mp*dr)+0.0161*Math.sin(dr*2*Mp)-0.0004*Math.sin(dr*3*Mp)+0.0104*Math.sin(dr*2*F)-0.0051*Math.sin(dr*(Ma+Mp))-0.0074*Math.sin(dr*(Ma-Mp))+0.0004*Math.sin(dr*(2*F+Ma))-0.0004*Math.sin(dr*(2*F-Ma))-0.0006*Math.sin(dr*(2*F+Mp))+0.0010*Math.sin(dr*(2*F-Mp))+0.0005*Math.sin(dr*(2*Mp+Ma));const dt=T<-11?0.001+0.000839*T+0.0002261*T2-0.00000845*T3-0.000000081*T*T3:-0.000278+0.000265*T+0.000262*T2;return J+C1-dt;}

function getLM11(yy,tz){const off=jdFD(31,12,yy)-2415021,k=INT(off/29.530588853);let nm=getNMD(k,tz);if(INT(sunLon(nm-0.5-tz/24)/30)>=9)nm=getNMD(k-1,tz);return nm;}
function getLMO(a11,tz){const k=INT((a11-2415021.076998695)/29.530588853+0.5);let last=0,i=1,arc=INT(sunLon(getNMD(k+i,tz)-0.5-tz/24)/30);do{last=arc;i++;arc=INT(sunLon(getNMD(k+i,tz)-0.5-tz/24)/30);}while(arc!==last&&i<14);return i-1;}

function convertSolar2Lunar(dd,mm,yy,tz=7){
  dd=+dd;mm=+mm;yy=+yy;tz=+tz;
  const dn=jdFD(dd,mm,yy),k=INT((dn-2415021.076998695)/29.530588853);
  let ms=getNMD(k+1,tz);if(ms>dn)ms=getNMD(k,tz);
  let a11=getLM11(yy,tz),b11=a11,lY;
  if(a11>=ms){lY=yy;a11=getLM11(yy-1,tz);}else{lY=yy+1;b11=getLM11(yy+1,tz);}
  const lD=dn-ms+1,diff=INT((ms-a11)/29);
  let lLeap=0,lM=diff+11;
  if(b11-a11>365){const lo=getLMO(a11,tz);if(diff>=lo){lM=diff+10;if(diff===lo)lLeap=1;}}
  if(lM>12)lM-=12;if(lM>=11&&diff<4)lY--;
  const cyI=((lY-4)%10+10)%10+1,chyI=((lY-4)%12+12)%12+1;
  const cmI=((cyI*2+lM-1)%10+10)%10+1,chmI=lM%12+1;
  const cdI=(dn+9)%10+1,chdI=(dn+1)%12+1;
  const angle=sunLon(dn-0.5+12/24-tz/24),idx=INT(angle/15)%24,term=SOLAR_TERMS[idx];
  const[,,yr]=jdTD(dn),tJD=stJD(yr,term[1],term[2],term[3]);
  const tTime=jdTS(tJD,tz),lJD=INT(tJD+0.5+tz/24),[td,tm,ty]=jdTD(lJD);
  const tDate=`${String(td).padStart(2,'0')}/${String(tm).padStart(2,'0')}/${ty}`;
  const chiKien=term[4],trI=((chdI-chiKien)%12+12)%12+1;
  const trucStr=TRUC[trI-1];
  const btI=(dn+11)%28,bt=BAT_TU[btI];
  let i6d=0;for(let i=0;i<60;i++){if(i%10===(cdI-1)&&i%12===(chdI-1)){i6d=i;break;}}
  let i6y=0;for(let i=0;i<60;i++){if(i%10===(cyI-1)&&i%12===(chyI-1)){i6y=i;break;}}
  const naD=NAP_AM[Math.floor(i6d/2)],naY=NAP_AM[Math.floor(i6y/2)];
  const hdRow=GIO_HD[chdI-1];
  const gioHD=[],gioAC=[];
  for(let i=0;i<12;i++){if(hdRow[i])gioHD.push(GIO_NAMES[i]);else gioAC.push(GIO_NAMES[i]);}
  const huong=getHuongXuatHanh(cdI-1,chdI-1);
  const trucInfo=TRUC_INFO[trucStr];
  const trucGood=['Kiến','Trừ','Bình','Định','Thành','Khai'].includes(trucStr);
  const batTuGood=bt[5];
  let danhGia,dgCls;
  if(trucGood&&batTuGood){danhGia='Ngày Tốt ✓';dgCls='good';}
  else if(!trucGood&&!batTuGood){danhGia='Ngày Xấu ✗';dgCls='bad';}
  else{danhGia='Ngày Trung Bình';dgCls='neutral';}
  return{day:lD,month:lM,year:lY,isLeap:lLeap,
    canChiDay:CAN[cdI-1]+' '+CHI[chdI-1],canChiMonth:CAN[cmI-1]+' '+CHI[chmI-1],canChiYear:CAN[cyI-1]+' '+CHI[chyI-1],
    tietKhi:term[0],tietKhiTime:tTime,tietKhiDate:tDate,
    truc:trucStr,trucInfo,trucGood,
    batTu:bt,batTuGood,
    napAmNgay:naD[0],napAmNgayHanh:naD[1],napAmNam:naY[0],napAmNamHanh:naY[1],
    gioHD,gioAC,huong,danhGia,dgCls};
}

// ── CONVERT L→S ─────────────────────────────────────────────────
function convertLunar2Solar(lD,lM,lY,lLeap,tz=7){
  lD=+lD;lM=+lM;lY=+lY;tz=+tz;
  let a11,b11;
  if(lM<11){a11=getLM11(lY-1,tz);b11=getLM11(lY,tz);}else{a11=getLM11(lY,tz);b11=getLM11(lY+1,tz);}
  const k=INT(0.5+(a11-2415021.076998695)/29.530588853);
  let off=lM-11;if(off<0)off+=12;
  if(b11-a11>365){const lo=getLMO(a11,tz);let lmth=lo-2;if(lmth<0)lmth+=12;if(lLeap&&lM!==lmth)return null;else if(lLeap||off>=lo)off+=1;}
  return jdTD(getNMD(k+off,tz)+lD-1);
}

// ── RENDER ───────────────────────────────────────────────────────
function renderResult(r,dd,mm,yy){
  const lp=r.isLeap?' <span class="badge neutral">Nhuận</span>':'';
  const thu=['CN','T2','T3','T4','T5','T6','T7'][new Date(yy,mm-1,dd).getDay()];
  const btCls=r.batTuGood?'good':'bad';
  const trucCls=r.trucInfo.cls;

  // Hướng Hạc
  let hacHTML='';
  if(r.huong.hac) hacHTML=`<div class="huong-item huong-hac"><b>🚫 Hạc Thần (tránh)</b><br>${r.huong.hac}</div>`;
  else hacHTML=`<div class="huong-item" style="background:#e8f4e8;color:#155724"><b>✅ Hạc Thần</b><br>Hôm nay Hạc Thần bận trên trời, xuất hành mọi hướng đều được!</div>`;

  // Giờ HD
  let hdHTML='<div class="gio-grid">';
  for(const g of r.gioHD)hdHTML+=`<div class="gio-item gio-hd">🟢 ${g}</div>`;
  for(const g of r.gioAC)hdHTML+=`<div class="gio-item gio-ac">🔴 ${g}</div>`;
  hdHTML+='</div>';

  return `
<div class="card">
  <div class="card-title">📅 Thông tin ngày</div>
  <div class="row"><span class="lbl">Dương lịch</span><span class="val">${dd}/${mm}/${yy} (${thu})</span></div>
  <div class="row"><span class="lbl">Âm lịch</span><span class="val">${r.day}/${r.month}${lp}/${r.year}</span></div>
  <div class="row"><span class="lbl">Đánh giá</span><span class="val"><span class="badge ${r.dgCls}">${r.danhGia}</span></span></div>
</div>
<div class="card">
  <div class="card-title">☯ Can Chi</div>
  <div class="row"><span class="lbl">Ngày</span><span class="val">${r.canChiDay}</span></div>
  <div class="row"><span class="lbl">Tháng</span><span class="val">${r.canChiMonth}</span></div>
  <div class="row"><span class="lbl">Năm</span><span class="val">${r.canChiYear}</span></div>
  <div class="row"><span class="lbl">Nạp Âm ngày</span><span class="val">${r.napAmNgay} (${r.napAmNgayHanh})</span></div>
  <div class="row"><span class="lbl">Nạp Âm năm</span><span class="val">${r.napAmNam} (${r.napAmNamHanh})</span></div>
</div>
<div class="card">
  <div class="card-title">🌿 Tiết khí &amp; Kiến Trực</div>
  <div class="row"><span class="lbl">Tiết khí</span><span class="val">${r.tietKhi}</span></div>
  <div class="row"><span class="lbl">Chuyển tiết</span><span class="val">${r.tietKhiDate} lúc ${r.tietKhiTime}</span></div>
  <div class="row"><span class="lbl">Kiến Trực</span><span class="val"><span class="badge ${trucCls}">${r.truc}</span></span></div>
  <div class="dg-box dg-${r.trucInfo.cls}" style="margin-top:6px;">${r.trucInfo.mo}</div>
</div>
<div class="card">
  <div class="card-title">⭐ Nhị Thập Bát Tú</div>
  <div class="row"><span class="lbl">Sao</span><span class="val"><span class="badge ${btCls}">${r.batTu[0]}</span></span></div>
  <div class="row"><span class="lbl">Cung / Hành</span><span class="val">${r.batTu[2]} / ${r.batTu[3]}</span></div>
  <div class="row"><span class="lbl">Phương</span><span class="val">${r.batTu[4]}</span></div>
  <div class="dg-box dg-${r.batTuGood?'good':'bad'}" style="margin-top:6px;">${r.batTu[6]}</div>
</div>
<div class="card">
  <div class="card-title">🧭 Hướng Xuất Hành</div>
  <div class="huong-grid">
    <div class="huong-item huong-hy"><b>🔴 Hỷ Thần (tốt)</b><br>${r.huong.hy}</div>
    <div class="huong-item huong-tai"><b>💰 Tài Thần (tốt)</b><br>${r.huong.tai}</div>
    ${hacHTML}
  </div>
</div>
<div class="card">
  <div class="card-title">🕐 Giờ Hoàng Đạo / Hắc Đạo</div>

}

function xemLich(){
  const d=+document.getElementById('selDay').value,m=+document.getElementById('selMonth').value,y=+document.getElementById('selYear').value;
  try{document.getElementById('result').innerHTML=renderResult(convertSolar2Lunar(d,m,y,7),d,m,y);}
  catch(e){document.getElementById('result').innerHTML=`<div class="card"><b>Lỗi:</b> ${e}</div>`;}
}
function xemLichAm(){
  const ad=+document.getElementById('amDay').value,am=+document.getElementById('amMonth').value,ay=+document.getElementById('amYear').value,leap=document.getElementById('amLeap').checked;
  try{
    const res=convertLunar2Solar(ad,am,ay,leap,7);
    if(!res){document.getElementById('resultAm').innerHTML='<div class="card">Tháng nhuận không hợp lệ cho năm này.</div>';return;}
    const[dd,mm,yy]=res;
    document.getElementById('resultAm').innerHTML=renderResult(convertSolar2Lunar(dd,mm,yy,7),dd,mm,yy);
  }catch(e){document.getElementById('resultAm').innerHTML=`<div class="card"><b>Lỗi:</b> ${e}</div>`;}
}

// ── XEM THÁNG ────────────────────────────────────────────────────
function xemThang(){
  const m=+document.getElementById('calMonth').value,y=+document.getElementById('calYear').value;
  const firstDay=new Date(y,m-1,1).getDay(),lastDate=new Date(y,m,0).getDate();
  const todayJD=jdFD(today.getDate(),today.getMonth()+1,today.getFullYear());
  let html='<div class="card"><div class="cal-grid">';
  for(const h of ['CN','T2','T3','T4','T5','T6','T7'])html+=`<div class="cal-head">${h}</div>`;
  for(let i=0;i<firstDay;i++)html+='<div></div>';
  for(let d=1;d<=lastDate;d++){
    const r=convertSolar2Lunar(d,m,y,7),jd=jdFD(d,m,y),isToday=jd===todayJD;
    const ti=TRUC_INFO[r.truc];
    const trCls=ti.cls==='good'?'tr-good':ti.cls==='bad'?'tr-bad':'tr-mid';
    html+=`<div class="cal-day${isToday?' today':''}" onclick="chonNgay(${d},${m},${y})">
      <div class="sl">${d}</div>
      <div class="am">${r.day}/${r.month}</div>
      <div class="${trCls}">${r.truc}</div>
    </div>`;
  }
  html+='</div></div>';
  document.getElementById('calResult').innerHTML=html;
}
function chonNgay(d,m,y){
  document.getElementById('selDay').value=d;document.getElementById('selMonth').value=m;document.getElementById('selYear').value=y;
  switchTab('dl');xemLich();
}

xemLich();
